{{define "messages.html"}}
{{template "header" .}}
<div class="card">
    <h2>群 {{.GroupID}} 消息记录</h2>
    <a href="/groups" class="back-link">← 返回群列表</a>

    {{if .Messages}}
    <p class="subtitle">共 {{len .Messages}} 条缓存消息</p>
    <table class="msg-table">
        <thead>
            <tr>
                <th>发送者</th>
                <th>内容</th>
                <th>时间</th>
            </tr>
        </thead>
        <tbody>
            {{range .Messages}}
            <tr>
                <td class="sender-cell">{{.Nick}}</td>
                <td class="content-cell">{{.Content}}</td>
                <td class="time-cell">{{.Time}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
    {{else}}
    <p class="empty">该群暂无缓存消息</p>
    {{end}}
</div>

<meta http-equiv="refresh" content="5">
{{template "footer" .}}
{{end}}
