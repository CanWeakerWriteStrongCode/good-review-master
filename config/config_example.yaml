# ===== NapCat 连接配置 =====
napcat:
  # NapCat HTTP API 地址（WebUI → 网络配置 → HTTP服务 → 端口，默认 3000）
  http_api: "http://127.0.0.1:3000"
  # NapCat 访问令牌（WebUI → 网络配置 → HTTP服务端 → 创建HTTP服务端的时候自己设置的Access Token，未设置则留空）
  access_token: ""

# ===== 机器人配置 =====
bot:
  # 机器人QQ号
  qq: "123456"
  # 允许响应的群号（白名单，逗号分隔）
  allow_groups: "123456,789012"

# ===== 运行时参数 =====
runtime:
  # 缓存最大消息数
  max_cache_msg: 20
  # 调用大模型超时（秒）
  llm_timeout_sec: 20
  # 单条消息最大字符数（超出截断）
  max_msg_rune: 200
  # HTTP 轮询间隔（秒）
  poll_interval_sec: 3
  # Web 管理面板端口（<=0 禁用）
  web_port: 8080

# ===== 大模型配置 =====
llm:
  # 固定填 openai（兼容所有OpenAI格式模型）
  provider: "openai"
  # 你的大模型API Key
  api_key: "sk-xxx"
  # 大模型接口地址
  api_base: "https://api.deepseek.com"
  # 模型名
  model_name: "deepseek-v4-flash"
  # 锐评风格：1.0=发散 0.5=集中
  temperature: 1.2
  # 核采样参数：越小输出越集中
  top_p: 0.95
