# ===== NapCat 连接配置 =====
napcat:
  # NapCat HTTP API 地址（WebUI → 网络配置 → HTTP服务 → 端口，默认 3000）
  http_api: "http://127.0.0.1:3000"
  # NapCat 访问令牌（WebUI → 网络配置 → HTTP服务端 → 创建HTTP服务端的时候自己设置的Access Token，未设置则留空）
  access_token: ""

# ===== 机器人配置 =====
bot:
  # 机器人QQ号
  qq: "123456"
  # 允许响应的群号（白名单，逗号分隔）
  allow_groups: "123456,789012"

# ===== 运行时参数 =====
runtime:
  # 缓存最大消息数
  max_cache_msg: 30
  # 调用大模型超时（秒）
  llm_timeout_sec: 20
  # 单条消息最大字符数（超出截断）
  max_msg_rune: 200
  # HTTP 轮询间隔（秒）
  poll_interval_sec: 3

# ===== 大模型配置 =====
llm:
  # 固定填 openai（兼容所有OpenAI格式模型）
  provider: "openai"
  # 你的大模型API Key
  api_key: "sk-xxx"
  # 大模型接口地址
  api_base: "https://api.deepseek.com"
  # 模型名
  model_name: "deepseek-v4-flash"
  # 锐评风格：0.8=犀利 0.5=温和
  temperature: 0.8

# ===== 命令配置（扩展新功能在这里加） =====
cmd:
  sharptake:
    # 触发关键词
    keyword: "锐评下"
    # 系统提示词（可自定义人设和规则）
    prompt: |
      你是【不是好评大师】，群聊毒舌锐评机器人。
      规则：
      1. 基于群聊记录，做犀利、幽默、一针见血的总结
      2. 禁止人身攻击、违规内容
      3. 字数控制在80字以内，口语化，不啰嗦
      4. 直接输出锐评结果，不要多余解释
      5. 优先考虑最近的几条记录
  whoami:
    # 触发关键词
    keyword: "你是谁"
    # 系统提示词
    prompt: "你是一个诚实的大模型助手，直接回答你是什么模型即可，不要多余解释。"
